name: CI - Microservices

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - master
permissions:
  contents: write
  pull-requests: write
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [common, product-service, order-service, payment-service]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -B clean verify
        working-directory: ./${{ matrix.service }}

  create-pr:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Create PR from develop to master
        uses: repo-sync/pull-request@v2
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_GERAL }}
        with:
          source_branch: "develop"
          destination_branch: "master"
          pr_title: "Sync develop -> master"
          pr_body: "Automated PR from develop to master after successful CI build"

name: CI - Microservices

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [common, product-service, order-service, payment-service, api-gateway, config-server, discovery-server]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn -B clean verify
        working-directory: ./${{ matrix.service }}

  create-pr:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Create PR from develop to main
        uses: peter-evans/create-pull-request@v5
        with:
          base: main
          branch: develop
          title: 'Sync develop -> main'
          body: 'Automated PR from develop to main after successful CI build'
